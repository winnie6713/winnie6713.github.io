name: 更新美股面板数据

# 定时抓取行情并把生成的 js/panel-data.js 提交回仓库
on:
  schedule:
    # UTC 时间每天 22:00（约美股收盘后），周一到周五
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {}   # 允许在 Actions 页面手动点「Run workflow」

permissions:
  contents: write         # 需要写权限把数据提交回仓库

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install yfinance

      - name: 抓取行情并生成数据
        run: python scripts/fetch_data.py

      - name: 提交变更（有变化才提交）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain js/panel-data.js)" ]; then
            git add js/panel-data.js
            git commit -m "chore: 自动更新面板数据 $(date -u +%Y-%m-%d)"
            git push
          else
            echo "数据无变化，跳过提交"
          fi
