<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据面板 · 美股学习笔记</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="brand">📈 美股学习<span class="dot">·</span>笔记</a>
      <div class="links">
        <a href="index.html">首页</a>
        <a href="panel.html" class="active">数据面板</a>
        <a href="notes.html">学习笔记</a>
        <a href="resources.html">资源导航</a>
      </div>
    </div>
  </nav>

  <div class="wrap">
    <!-- 顶部工具条：板块下拉 + 搜索 -->
    <div class="panel-toolbar">
      <label class="sel-wrap">
        <span class="sel-label">跳转板块</span>
        <select id="sector-select"></select>
      </label>
      <input id="panel-search" type="search" placeholder="搜索名称 / 代码，如 NVDA">
    </div>

    <div id="panel-updated" class="panel-updated"></div>

    <!-- 板块标题 -->
    <div id="sector-head" class="sector-head"></div>
    <!-- 板块表格 -->
    <div id="sector-body"></div>
  </div>

  <footer class="footer">
    个人美股学习笔记 · 数据仅供学习参考，不构成任何投资建议
  </footer>

  <script src="js/panel-data.js"></script>
  <script src="js/panel.js"></script>
</body>
</html>
